name: Tibia Flipper

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: tibia-state-${{ github.run_id }}
          restore-keys: |
            tibia-state-

      - name: Install dependencies
        run: npm install

      - name: Fetch item metadata
        run: node scripts/fetch-items.js

      - name: Run flipper
        run: node check-flips.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🚨 Tibia Flipper GitHub Action failed. Check the Actions logs.\"}" \
          "$DISCORD_WEBHOOK_URL"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: tibia-state-${{ github.run_id }}
