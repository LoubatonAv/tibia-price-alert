name: Tibia Flipper

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Fetch item metadata
        run: node scripts/fetch-items.js

      - name: Run flipper
        run: node check-flips.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add state.json

          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "update flipper state"
            git pull --rebase
            git push
          fi

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"🚨 Tibia Flipper GitHub Action failed. Check the Actions logs.\"}" \
          "$DISCORD_WEBHOOK_URL"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
