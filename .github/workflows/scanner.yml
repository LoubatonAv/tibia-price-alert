name: Tibia Scanner

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

concurrency:
  group: tibia-scanner
  cancel-in-progress: true

jobs:
  scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Restore scanner state cache
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: tibia-scanner-state-${{ github.run_id }}
          restore-keys: |
            tibia-scanner-state-

      - name: Run Tibia scanner
        run: npm run scanner
        env:
          TIBIA_SCANNER_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TIBIA_WORLD: Harmonia
          SCANNER_MODE: tracked

      - name: Save scanner state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: tibia-scanner-state-${{ github.run_id }}
