name: Tibia Scroll Crafting

on:
  workflow_dispatch:
  schedule:
    - cron: "20 10 * * *"

concurrency:
  group: tibia-scroll-crafting
  cancel-in-progress: true

jobs:
  scroll-crafting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Send Powerful scroll crafting alerts
        run: npm run scrolls-discord
        env:
          TIBIA_SCROLLS_WEBHOOK_URL: ${{ secrets.TIBIA_SCROLLS_WEBHOOK_URL }}
          TIBIA_SCANNER_WEBHOOK_URL: ${{ secrets.TIBIA_SCANNER_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TIBIA_WORLD: Harmonia
